<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ilham Wijaya — IT Infrastructure</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* canvas — near-black, faintly cool */
    --bg:        oklch(0.165 0.008 250);
    --bg-2:      oklch(0.195 0.009 250);
    --panel:     oklch(0.215 0.010 250);
    --panel-2:   oklch(0.235 0.011 250);
    --line:      oklch(0.30 0.012 250);
    --line-soft: oklch(0.26 0.011 250);

    /* ink */
    --fg:        oklch(0.94 0.006 250);
    --fg-dim:    oklch(0.72 0.012 250);
    --fg-faint:  oklch(0.56 0.012 250);

    /* accents */
    --cyan:      oklch(0.82 0.12 220);   /* interactive / primary action */
    --cyan-dim:  oklch(0.62 0.09 220);
    --green:     oklch(0.82 0.16 150);   /* system status: UP / online */
    --green-dim: oklch(0.55 0.10 150);
    --amber:     oklch(0.83 0.13 75);

    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --sans: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: var(--bg); scroll-behavior: smooth; scroll-padding-top: 88px; }
  body { background: var(--bg); }

  body {
    font-family: var(--sans);
    color: var(--fg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  ::selection { background: color-mix(in oklch, var(--cyan) 30%, transparent); color: var(--fg); }

  /* ---------- atmosphere ---------- */
  .hero {
    position: relative;
    min-height: calc(100vh - 73px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* faint engineering grid + soft phosphor glow + grain */
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, var(--line-soft) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(115% 90% at 72% 8%, #000 0%, transparent 70%);
            mask-image: radial-gradient(115% 90% at 72% 8%, #000 0%, transparent 70%);
    opacity: 0.5;
    pointer-events: none;
  }
  .hero::after {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(60% 50% at 78% 4%, color-mix(in oklch, var(--green) 14%, transparent) 0%, transparent 60%),
      radial-gradient(70% 60% at 8% 96%, color-mix(in oklch, var(--cyan) 9%, transparent) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero > * { position: relative; z-index: 1; }

  /* ---------- top bar ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 22px clamp(24px, 5vw, 72px);
    border-bottom: 1px solid var(--line-soft);
    background: color-mix(in oklch, var(--bg) 82%, transparent);
    backdrop-filter: blur(10px);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 30px; height: 30px;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    border-radius: 7px;
    font-family: var(--mono);
    font-weight: 600; font-size: 13px;
    color: var(--fg);
    background: var(--panel);
  }
  .brand-path {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--fg-faint);
    letter-spacing: 0.01em;
  }
  .brand-path b { color: var(--fg-dim); font-weight: 500; }

  .topnav { display: flex; align-items: center; gap: 4px; }
  .topnav a {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--fg-dim);
    text-decoration: none;
    padding: 8px 13px;
    border-radius: 6px;
    transition: color .18s ease, background .18s ease;
  }
  .topnav a::before { content: "/ "; color: var(--line); }
  .topnav a:hover { color: var(--fg); background: var(--panel); }

  .topnav a.lab-link {
    color: var(--cyan);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 15px;
    margin-left: 6px;
    border: 1px solid color-mix(in oklch, var(--cyan) 40%, var(--line));
    border-radius: 999px;
    background: color-mix(in oklch, var(--cyan) 8%, transparent);
    transition: color .18s ease, background .18s ease, border-color .18s ease;
  }
  .topnav a.lab-link::before { content: none; }
  .topnav a.lab-link:hover {
    color: var(--cyan);
    background: color-mix(in oklch, var(--cyan) 16%, transparent);
    border-color: var(--cyan);
  }
  .lab-link .arw { display: inline-block; transition: transform .18s ease; }
  .topnav a.lab-link:hover .arw { transform: translate(2px, -2px); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--green);
    padding: 7px 12px;
    border: 1px solid color-mix(in oklch, var(--green) 32%, var(--line));
    border-radius: 999px;
    background: color-mix(in oklch, var(--green) 8%, transparent);
    white-space: nowrap;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--green) 70%, transparent);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--green) 60%, transparent); }
    70%  { box-shadow: 0 0 0 6px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* ---------- main grid ---------- */
  .stage {
    flex: 1;
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    align-items: center;
    gap: clamp(32px, 5vw, 80px);
    padding: clamp(40px, 6vh, 88px) clamp(24px, 5vw, 72px);
    max-width: 1560px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- identity column ---------- */
  .kicker {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 26px;
  }
  .kicker .bar { width: 28px; height: 1px; background: var(--cyan-dim); }

  .name {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(48px, 7.4vw, 104px);
    line-height: 0.96;
    letter-spacing: -0.03em;
    color: var(--fg);
    margin-bottom: 22px;
  }
  .name .accent { color: var(--fg); }

  .meta {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 10px 18px;
    font-family: var(--mono);
    font-size: clamp(13px, 1.2vw, 15px);
    color: var(--fg-dim);
    margin-bottom: 34px;
  }
  .meta .sep { color: var(--line); }
  .meta .geo { color: var(--fg-faint); }
  .meta b { color: var(--fg); font-weight: 500; }

  .tagline {
    font-family: var(--sans);
    font-weight: 400;
    font-size: clamp(19px, 2vw, 27px);
    line-height: 1.42;
    letter-spacing: -0.01em;
    color: var(--fg);
    max-width: 30ch;
    margin-bottom: 40px;
    text-wrap: balance;
  }
  .tagline .q { color: var(--fg-faint); }
  .tagline .hl {
    color: var(--green);
    position: relative;
    white-space: nowrap;
  }
  .tagline .hl::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 2px;
    height: 1px;
    background: color-mix(in oklch, var(--green) 45%, transparent);
  }

  /* CTAs */
  .ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 52px; }
  .btn {
    display: inline-flex; align-items: center; gap: 11px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 14px 22px;
    border-radius: 9px;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid transparent;
    transition: transform .16s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease, color .18s ease;
  }
  .btn .arw { font-size: 13px; transition: transform .18s ease; }
  .btn-primary {
    background: var(--cyan);
    color: oklch(0.18 0.02 250);
    box-shadow: 0 0 0 1px color-mix(in oklch, var(--cyan) 40%, transparent),
                0 12px 30px -12px color-mix(in oklch, var(--cyan) 55%, transparent);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px var(--cyan), 0 18px 40px -14px color-mix(in oklch, var(--cyan) 70%, transparent); }
  .btn-primary:hover .arw { transform: translateX(3px); }
  .btn-ghost {
    background: color-mix(in oklch, var(--panel) 50%, transparent);
    color: var(--fg);
    border-color: var(--line);
  }
  .btn-ghost:hover { border-color: var(--fg-faint); background: var(--panel); transform: translateY(-2px); }

  /* stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: clamp(20px, 3vw, 44px);
    align-items: start;
    padding-top: 30px;
    border-top: 1px solid var(--line-soft);
    width: fit-content;
  }
  .stat .num {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(26px, 3vw, 38px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin-bottom: 9px;
  }
  .stat .num em { color: var(--cyan); font-style: normal; }
  .stat .lbl {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg-faint);
    line-height: 1.5;
  }
  .stat.span .scope { display: flex; align-items: center; gap: 7px; }
  .stat.span .chip {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-dim);
  }
  .stat.span .plus { color: var(--green-dim); }

  /* ---------- terminal panel ---------- */
  .term-wrap { justify-self: stretch; }
  .term {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--line);
    border-radius: 13px;
    overflow: hidden;
    box-shadow:
      0 1px 0 0 color-mix(in oklch, var(--fg) 6%, transparent) inset,
      0 40px 80px -40px rgba(0,0,0,0.7),
      0 0 0 1px color-mix(in oklch, var(--green) 5%, transparent);
    width: 100%;
  }
  .term-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
  }
  .traffic { display: flex; gap: 8px; }
  .traffic i { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .traffic i:nth-child(1) { background: oklch(0.68 0.16 25); }
  .traffic i:nth-child(2) { background: oklch(0.82 0.13 75); }
  .traffic i:nth-child(3) { background: oklch(0.78 0.15 150); }
  .term-title {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-faint);
    letter-spacing: 0.01em;
  }
  .term-title b { color: var(--fg-dim); font-weight: 500; }
  .term-host {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.02em;
    color: var(--fg-faint);
  }

  .term-body {
    font-family: var(--mono);
    font-size: clamp(12.5px, 1.05vw, 14px);
    line-height: 1.9;
    padding: 18px 20px 22px;
    min-height: 360px;
  }
  .ln { display: block; white-space: pre-wrap; opacity: 0; transform: translateY(2px); }
  .ln.show { animation: lnin .26s ease forwards; }
  @keyframes lnin { to { opacity: 1; transform: none; } }

  .prompt { color: var(--green); }
  .cmd { color: var(--fg); }
  .muted { color: var(--fg-faint); }
  .key { color: var(--cyan); }
  .dotfill { color: var(--line); letter-spacing: 0.06em; }

  .ok    { color: var(--green); font-weight: 500; }
  .updn  { color: var(--green); }
  .info  { color: var(--cyan); }
  .warn  { color: var(--amber); }

  .badge-ok {
    display: inline-block;
    padding: 0 7px;
    border-radius: 4px;
    color: var(--green);
    background: color-mix(in oklch, var(--green) 12%, transparent);
    border: 1px solid color-mix(in oklch, var(--green) 26%, transparent);
  }

  .spin { color: var(--fg-faint); }

  /* category section header inside terminal */
  .sec {
    display: flex; align-items: center; gap: 11px;
    margin: 16px 0 5px;
    line-height: 1.2;
  }
  .sec:first-child { margin-top: 6px; }
  .sec-name {
    color: var(--cyan);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .sec-rule { flex: 1; height: 1px; background: var(--line-soft); }
  .sec-count {
    color: var(--fg-faint);
    font-size: 11px;
    padding: 1px 7px;
    border: 1px solid var(--line-soft);
    border-radius: 5px;
  }

  .cursor {
    display: inline-block;
    width: 8px; height: 1.05em;
    background: var(--green);
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .uptimebar {
    display: none;
  }

  /* entrance stagger for identity column */
  .rise { opacity: 0; transform: translateY(14px); animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  /* ---------- content sections ---------- */
  .section {
    position: relative;
    border-top: 1px solid var(--line-soft);
    padding: clamp(72px, 11vh, 132px) clamp(24px, 5vw, 72px);
  }
  .section-inner { max-width: 1560px; margin: 0 auto; }
  section[id] { scroll-margin-top: 88px; }

  .shead {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: clamp(40px, 6vh, 72px);
  }
  .shead-no {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 0.08em;
  }
  .shead-tag {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--fg-dim);
  }
  .shead-rule { flex: 1; height: 1px; background: var(--line-soft); }

  .about-grid {
    display: grid;
    grid-template-columns: 0.82fr 1.18fr;
    gap: clamp(40px, 5vw, 88px);
    align-items: start;
  }
  .about-aside { display: flex; flex-direction: column; }
  .about-photo {
    position: relative;
    width: 100%;
    max-width: 320px;
    margin: -4px 0 18px 0;
  }
  .about-photo img {
    position: relative; z-index: 1;
    width: 100%; height: auto;
    display: block;
    border-radius: 14px;
    border: 1px solid var(--line);
    /* cool the bright studio grey toward the near-black canvas */
    filter: grayscale(1) brightness(0.82) contrast(1.06);
    /* melt the bottom edge into the page where the location tag sits */
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 68%, rgba(0,0,0,0.35) 92%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 68%, rgba(0,0,0,0.35) 92%, transparent 100%);
  }
  /* cool duotone wash + top sheen so the portrait reads as part of the system */
  .about-photo::after {
    content: "";
    position: absolute; inset: 0;
    z-index: 2;
    border-radius: 14px;
    background:
      linear-gradient(180deg, transparent 55%, color-mix(in oklch, var(--bg) 92%, transparent) 100%),
      linear-gradient(145deg, color-mix(in oklch, var(--cyan) 16%, transparent) 0%, transparent 46%);
    mix-blend-mode: screen;
    pointer-events: none;
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 68%, rgba(0,0,0,0.35) 92%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 68%, rgba(0,0,0,0.35) 92%, transparent 100%);
  }
  /* soft phosphor halo so the frame doesn't float */
  .about-photo::before {
    content: "";
    position: absolute;
    left: 50%; top: 46%;
    width: 104%; height: 84%;
    transform: translate(-50%, -50%);
    background: radial-gradient(50% 50% at 50% 50%, color-mix(in oklch, var(--cyan) 13%, transparent) 0%, transparent 72%);
    filter: blur(16px);
    z-index: 0;
    pointer-events: none;
  }
  .about-photo .ph-tag {
    position: absolute; left: 10px; bottom: 8px;
    z-index: 3;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--green);
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 10px;
    border-radius: 7px;
    background: color-mix(in oklch, var(--bg) 55%, transparent);
    backdrop-filter: blur(4px);
  }
  .about-photo .ph-tag i {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px 0 var(--green);
  }
  .about-title {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(27px, 3vw, 41px);
    line-height: 1.16;
    letter-spacing: -0.025em;
    color: var(--fg);
    text-wrap: balance;
  }
  .about-title .c { color: var(--cyan); }
  .about-title .g { color: var(--green); }
  .about-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 30px;
  }
  .about-tags span {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-dim);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: color-mix(in oklch, var(--panel) 55%, transparent);
  }
  .about-body { max-width: 60ch; }
  .about-body p {
    font-family: var(--sans);
    font-size: clamp(16px, 1.2vw, 19px);
    line-height: 1.74;
    color: var(--fg-dim);
    letter-spacing: -0.005em;
  }
  .about-body p + p { margin-top: 22px; }
  .about-body b { color: var(--fg); font-weight: 500; }
  .about-body .tech {
    font-family: var(--mono);
    font-size: 0.9em;
    color: var(--green);
    letter-spacing: -0.01em;
  }
  .about-lead::first-letter {
    /* subtle emphasis on the opening, no drop-cap gimmick */
  }

  /* ---------- skills & certifications ---------- */
  .skills-legend {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 14px 26px;
    margin-bottom: clamp(34px, 5vh, 52px);
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-faint);
  }
  .legend-item { display: inline-flex; align-items: center; gap: 9px; }
  .legend-sep { width: 1px; height: 16px; background: var(--line); }

  .lvl { display: inline-flex; gap: 3px; align-items: center; flex-shrink: 0; }
  .lvl i { width: 6px; height: 6px; border-radius: 50%; background: var(--line); display: block; }
  .lvl i.on { background: var(--cyan); }

  .lab-chip {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--green);
    padding: 2px 7px;
    border: 1px solid color-mix(in oklch, var(--green) 28%, var(--line));
    border-radius: 5px;
    background: color-mix(in oklch, var(--green) 8%, transparent);
    flex-shrink: 0;
    text-decoration: none;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  a.lab-chip:hover {
    background: color-mix(in oklch, var(--green) 18%, transparent);
    border-color: color-mix(in oklch, var(--green) 55%, var(--line));
  }

  .sk-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(18px, 2vw, 26px);
    align-items: start;
  }
  .sk-card {
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    padding: clamp(22px, 2vw, 30px);
  }
  .sk-card-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .sk-cat {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(17px, 1.4vw, 20px);
    letter-spacing: -0.015em;
    color: var(--fg);
  }
  .sk-count { font-family: var(--mono); font-size: 11.5px; color: var(--fg-faint); margin-left: auto; }

  .sk-list { display: flex; flex-direction: column; }
  .sk-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid color-mix(in oklch, var(--line-soft) 55%, transparent);
  }
  .sk-row:last-child { border-bottom: none; }
  .sk-name {
    font-family: var(--sans);
    font-size: 14.5px;
    color: var(--fg-dim);
    flex: 1;
    line-height: 1.35;
    letter-spacing: -0.005em;
    text-decoration: none;
  }
  a.sk-name--linked {
    color: var(--cyan);
    text-decoration: none;
    transition: color .15s ease;
  }
  a.sk-name--linked:hover {
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: color-mix(in oklch, var(--cyan) 45%, transparent);
  }

  .sk-tools { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line-soft); }
  .sk-tools-label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--fg-faint);
    margin-bottom: 11px;
  }
  .sk-tool-group { margin-bottom: 11px; }
  .sk-tool-group:last-child { margin-bottom: 0; }
  .sk-tool-sub {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--fg-faint);
    opacity: 0.8;
    margin-bottom: 7px;
  }
  .tool-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .tool-chips span {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--fg-dim);
    padding: 4px 9px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: color-mix(in oklch, var(--bg-2) 50%, transparent);
  }
  .tool-chips span.lab {
    color: var(--green);
    border-color: color-mix(in oklch, var(--green) 26%, var(--line));
    background: color-mix(in oklch, var(--green) 7%, transparent);
  }

  /* certifications */
  .subhead {
    display: flex; align-items: center; gap: 16px;
    margin: clamp(52px, 8vh, 88px) 0 clamp(24px, 3vh, 32px);
  }
  .subhead h3 {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(19px, 1.7vw, 25px);
    letter-spacing: -0.02em;
    color: var(--fg);
  }
  .subhead .rule { flex: 1; height: 1px; background: var(--line-soft); }
  .subhead .cnt { font-family: var(--mono); font-size: 12px; color: var(--fg-faint); }

  .cert-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(16px, 2vw, 24px);
  }
  .cert-card {
    display: flex; flex-direction: column;
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    overflow: hidden;
    background: var(--panel);
    text-align: left;
    padding: 0;
    cursor: zoom-in;
    font: inherit;
    color: inherit;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .cert-card:hover {
    border-color: color-mix(in oklch, var(--brand, var(--cyan)) 50%, var(--line));
    transform: translateY(-3px);
    box-shadow: 0 20px 40px -24px rgba(0,0,0,0.7);
  }
  .cert-card:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }
  .cert-img {
    position: relative;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    background: #fff;
    border-bottom: 1px solid var(--line-soft);
  }
  .cert-img img {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
    display: block;
    transition: transform .35s ease;
  }
  .cert-card:hover .cert-img img { transform: scale(1.04); }
  .cert-brandbar { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 3; opacity: 0.95; }
  .cert-zoom {
    position: absolute; z-index: 4;
    right: 10px; bottom: 10px;
    display: grid; place-items: center;
    width: 30px; height: 30px;
    border-radius: 8px;
    color: var(--fg);
    background: color-mix(in oklch, var(--bg) 72%, transparent);
    border: 1px solid var(--line);
    backdrop-filter: blur(4px);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .2s ease, transform .2s ease;
  }
  .cert-card:hover .cert-zoom { opacity: 1; transform: none; }
  .cert-body { display: flex; flex-direction: column; gap: 5px; padding: 16px 18px 18px; flex: 1; }
  .cert-code { font-family: var(--mono); font-size: 12px; color: var(--cyan); letter-spacing: 0.06em; }
  .cert-name { font-family: var(--sans); font-weight: 500; font-size: 15px; color: var(--fg); line-height: 1.3; }
  .cert-issuer { font-family: var(--mono); font-size: 12px; color: var(--fg-faint); }

  /* lightbox */
  .lb-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    padding: clamp(20px, 4vw, 56px);
    background: color-mix(in oklch, var(--bg) 82%, #000 18%);
    background-color: rgba(8, 10, 14, 0.84);
    backdrop-filter: blur(10px);
    animation: lbfade .2s ease;
  }
  @keyframes lbfade { from { opacity: 0; } }
  .lb-close {
    position: absolute; top: clamp(16px, 3vw, 28px); right: clamp(16px, 3vw, 28px);
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 13px;
    color: var(--fg);
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: var(--panel);
    cursor: pointer;
    transition: border-color .18s ease, background .18s ease;
  }
  .lb-close:hover { border-color: var(--fg-faint); background: var(--panel-2); }
  .lb-dialog {
    display: flex; flex-direction: column;
    max-width: min(1100px, 100%);
    max-height: 100%;
    animation: lbrise .26s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes lbrise { from { opacity: 0; transform: translateY(12px) scale(.98); } }
  .lb-figure {
    flex: 1; min-height: 0;
    display: grid; place-items: center;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
  }
  .lb-figure img {
    display: block;
    max-width: 100%;
    max-height: 74vh;
    object-fit: contain;
  }
  .lb-caption {
    display: flex; flex-direction: column; gap: 4px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 12px 12px;
  }
  .lb-code { font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em; font-weight: 600; }
  .lb-name { font-family: var(--sans); font-weight: 500; font-size: 17px; color: var(--fg); }
  .lb-issuer { font-family: var(--mono); font-size: 12.5px; color: var(--fg-faint); }

  /* ---------- experience & education ---------- */
  .xp-intro {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-faint);
    letter-spacing: 0.02em;
    margin-bottom: clamp(34px, 5vh, 52px);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .xp-intro b { color: var(--fg-dim); font-weight: 500; }
  .xp-intro .dot-sep { width: 4px; height: 4px; border-radius: 50%; background: var(--line); }

  .xp-wrap { position: relative; }
  /* the rail */
  .xp-wrap::before {
    content: "";
    position: absolute;
    left: 9px; top: 26px; bottom: 34px;
    width: 2px;
    background: linear-gradient(180deg,
      var(--line) 0%,
      var(--line-soft) 70%,
      transparent 100%);
  }

  .xp-item { position: relative; padding-left: 46px; margin-bottom: 22px; }
  .xp-item:last-child { margin-bottom: 0; }

  .xp-node {
    position: absolute;
    left: 0; top: 24px;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--bg);
    border: 1px solid var(--line);
    z-index: 1;
  }
  .xp-node i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--fg-faint);
    display: block;
  }
  .xp-node.now {
    border-color: color-mix(in oklch, var(--green) 50%, var(--line));
    background: color-mix(in oklch, var(--green) 10%, var(--bg));
  }
  .xp-node.now i {
    background: var(--green);
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--green) 70%, transparent);
    animation: pulse 2.4s ease-out infinite;
  }

  .xp-card {
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    padding: clamp(22px, 2.2vw, 30px) clamp(22px, 2.4vw, 34px);
    transition: border-color .2s ease;
  }
  .xp-card:hover { border-color: var(--line); }

  .xp-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px 24px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .xp-company {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(18px, 1.6vw, 23px);
    letter-spacing: -0.02em;
    color: var(--fg);
    line-height: 1.2;
  }
  .xp-period {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    color: var(--fg-faint);
    white-space: nowrap;
    padding: 5px 11px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .xp-period.now {
    color: var(--green);
    border-color: color-mix(in oklch, var(--green) 30%, var(--line));
    background: color-mix(in oklch, var(--green) 7%, transparent);
  }

  /* roles */
  .xp-roles { list-style: none; margin: 6px 0 0; }
  .xp-role-line {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    padding: 3px 0;
  }
  .xp-role-line + .xp-role-line { border-top: 1px dashed color-mix(in oklch, var(--line-soft) 70%, transparent); }
  .xp-role {
    font-family: var(--sans);
    font-weight: 500;
    font-size: clamp(14.5px, 1.2vw, 16px);
    color: var(--cyan);
    letter-spacing: -0.005em;
  }
  .xp-role .sub { color: var(--cyan-dim); font-weight: 400; }
  .xp-rperiod {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--fg-faint);
    margin-left: auto;
  }
  .xp-promo {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.03em;
    color: var(--green);
    margin-top: 11px;
    padding: 4px 10px;
    border: 1px solid color-mix(in oklch, var(--green) 26%, var(--line));
    border-radius: 6px;
    background: color-mix(in oklch, var(--green) 7%, transparent);
  }

  .xp-context {
    font-family: var(--sans);
    font-size: clamp(14.5px, 1.15vw, 16px);
    line-height: 1.6;
    color: var(--fg-dim);
    margin-top: 16px;
    letter-spacing: -0.005em;
    max-width: 76ch;
  }
  .xp-context b { color: var(--fg); font-weight: 500; }

  .xp-bullets { list-style: none; margin-top: 16px; display: flex; flex-direction: column; gap: 9px; }
  .xp-bullets li {
    position: relative;
    padding-left: 22px;
    font-family: var(--sans);
    font-size: clamp(14px, 1.1vw, 15.5px);
    line-height: 1.55;
    color: var(--fg-dim);
    letter-spacing: -0.005em;
    max-width: 80ch;
  }
  .xp-bullets li::before {
    content: "›";
    position: absolute; left: 4px; top: -1px;
    font-family: var(--mono);
    color: var(--cyan-dim);
  }
  .xp-bullets li b { color: var(--fg); font-weight: 500; }

  .xp-tags {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .xp-tags-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--fg-faint);
    margin-right: 4px;
  }
  .xp-tags span.chip {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--fg-dim);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: color-mix(in oklch, var(--bg-2) 50%, transparent);
  }

  /* education */
  .edu-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: clamp(20px, 3vw, 40px);
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    padding: clamp(24px, 2.4vw, 34px);
  }
  .edu-mark {
    width: 46px; height: 46px;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: var(--panel-2);
    color: var(--cyan);
  }
  .edu-main { min-width: 0; }
  .edu-school {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(18px, 1.5vw, 22px);
    letter-spacing: -0.02em;
    color: var(--fg);
  }
  .edu-degree {
    font-family: var(--sans);
    font-size: clamp(14.5px, 1.2vw, 16px);
    color: var(--cyan);
    font-weight: 500;
    margin-top: 4px;
  }
  .edu-thesis {
    font-family: var(--sans);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--fg-dim);
    margin-top: 14px;
    max-width: 70ch;
  }
  .edu-thesis .lbl {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-faint);
    margin-right: 8px;
  }
  .edu-meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    text-align: right;
    flex-shrink: 0;
  }
  .edu-period {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-faint);
    white-space: nowrap;
  }
  .edu-gpa {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-dim);
    padding: 5px 11px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    white-space: nowrap;
  }
  .edu-gpa b { color: var(--cyan); font-weight: 600; }

  @media (max-width: 680px) {
    .edu-card { grid-template-columns: 1fr; gap: 18px; }
    .edu-meta { align-items: flex-start; text-align: left; flex-direction: row; flex-wrap: wrap; }
    .xp-rperiod { margin-left: 0; }
  }

  /* ---------- contact ---------- */
  .contact { border-top: 1px solid var(--line-soft); }
  .contact-grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: clamp(40px, 6vw, 100px);
    align-items: center;
  }

  .ct-prompt {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--fg-faint);
    letter-spacing: 0.02em;
    margin-bottom: 22px;
  }
  .ct-prompt .p { color: var(--green); }
  .ct-prompt .c { color: var(--fg-dim); }
  .ct-head {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(34px, 4.6vw, 60px);
    line-height: 1.02;
    letter-spacing: -0.03em;
    color: var(--fg);
    text-wrap: balance;
  }
  .ct-head .g { color: var(--green); }
  .ct-sub {
    font-family: var(--sans);
    font-size: clamp(16px, 1.3vw, 19px);
    line-height: 1.6;
    color: var(--fg-dim);
    max-width: 42ch;
    margin-top: 22px;
    letter-spacing: -0.005em;
  }
  .ct-avail {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.03em;
    color: var(--green);
    margin-top: 30px;
    padding: 8px 14px;
    border: 1px solid color-mix(in oklch, var(--green) 30%, var(--line));
    border-radius: 999px;
    background: color-mix(in oklch, var(--green) 7%, transparent);
  }
  .ct-avail i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--green) 70%, transparent);
    animation: pulse 2.4s ease-out infinite;
  }

  /* link list */
  .ct-links {
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    overflow: hidden;
  }
  .ct-row {
    display: flex; align-items: center; gap: clamp(14px, 1.6vw, 20px);
    width: 100%;
    padding: clamp(18px, 1.8vw, 24px) clamp(18px, 2vw, 26px);
    text-decoration: none;
    color: inherit;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line-soft);
    font: inherit;
    text-align: left;
    cursor: pointer;
    transition: background .18s ease;
  }
  .ct-row:last-child { border-bottom: none; }
  .ct-row:hover { background: color-mix(in oklch, var(--panel-2) 60%, transparent); }
  .ct-row:focus-visible { outline: 2px solid var(--cyan); outline-offset: -2px; }

  .ct-slot {
    width: 42px; height: 42px;
    flex-shrink: 0;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--panel-2);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--cyan);
    transition: border-color .18s ease, color .18s ease;
  }
  .ct-row:hover .ct-slot { border-color: color-mix(in oklch, var(--cyan) 45%, var(--line)); }

  .ct-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .ct-label {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--fg-faint);
  }
  .ct-value {
    font-family: var(--mono);
    font-size: clamp(13px, 1.2vw, 15px);
    color: var(--fg);
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ct-action {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--fg-faint);
    padding: 7px 11px;
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    transition: color .18s ease, border-color .18s ease, background .18s ease;
  }
  .ct-row:hover .ct-action { color: var(--cyan); border-color: color-mix(in oklch, var(--cyan) 40%, var(--line)); }
  .ct-action.copied { color: var(--green); border-color: color-mix(in oklch, var(--green) 40%, var(--line)); background: color-mix(in oklch, var(--green) 8%, transparent); }
  .ct-action svg { display: block; }

  /* footer */
  .site-foot {
    border-top: 1px solid var(--line-soft);
    padding: 28px clamp(24px, 5vw, 72px);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px 24px; flex-wrap: wrap;
  }
  .site-foot .fl, .site-foot .fr {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-faint);
    letter-spacing: 0.02em;
  }
  .site-foot .fr { display: inline-flex; align-items: center; gap: 9px; }
  .site-foot .fr .dot { width: 6px; height: 6px; }
  .site-foot b { color: var(--fg-dim); font-weight: 500; }

  @media (max-width: 860px) {
    .contact-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 900px) {
    .cert-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 760px) {
    .sk-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 860px) {
    .about-grid { grid-template-columns: 1fr; gap: 32px; }
    .about-body { max-width: none; }
  }
  @media (max-width: 1020px) {
    .stage { grid-template-columns: 1fr; gap: 44px; padding-top: 40px; }
    .term-wrap { order: 2; max-width: 620px; }
    .identity { order: 1; }
  }
  @media (max-width: 760px) {
    .topnav { display: none; }
  }
  @media (max-width: 560px) {
    .topbar { padding: 16px 20px; }
    .stage { padding: 32px 20px 48px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 22px 28px; }
    .status-pill .txt { display: none; }
    .brand-path { display: none; }
  }
  @media (max-width: 560px) {
    .cert-grid { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, .ln.show { animation: none !important; }
    .rise, .ln { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="skills.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ----- terminal: lab status grouped by category (mirrors Skills) ----- */
const GROUPS = [
  { name: "network", checks: [
    { label: "ospf     core-hq ⇄ pa-hq",   status: "FULL" },
    { label: "bgp      as65100 ⇄ as65200", status: "ESTABLISHED" },
    { label: "ipsec    HQ ⇄ Branch",        status: "UP" },
  ]},
  { name: "network-security", checks: [
    { label: "firewall pa-hq zones",         status: "ACTIVE" },
    { label: "radius   nps · aaa",           status: "AUTH OK" },
  ]},
  { name: "server-virtualization", checks: [
    { label: "proxmox  ve node",             status: "UP" },
    { label: "k3s      nodes",               status: "2/2 Ready" },
    { label: "ad·dns   ilwij.lab",           status: "ONLINE" },
  ]},
  { name: "cloud", checks: [
    { label: "azure    ipsec gateway",       status: "CONNECTED" },
    { label: "azure    vm-web-lab",          status: "RUNNING" },
  ]},
  { name: "monitoring", checks: [
    { label: "prometheus targets",          status: "running" },
    { label: "grafana  dashboards",          status: "running" },
  ]},
  { name: "programming", checks: [
    { label: "nginx    portfolio site",      status: "SERVING" },
    { label: "git      ilwij/portfolio",     status: "TRACKED" },
  ]},
];

// flatten into a renderable line stream
const LINES = (() => {
  const out = [{ t: "cmd", text: "$ ./check-lab.sh --site all" }];
  let n = 0;
  GROUPS.forEach(g => {
    out.push({ t: "section", name: g.name, count: g.checks.length });
    g.checks.forEach(c => { out.push({ t: "out", ...c }); n++; });
  });
  out.push({ t: "done", text: n + " checks passed · 0 failed" });
  return out;
})();

function StatusLine({ line }) {
  // each output line briefly shows a spinner, then resolves to its status
  const [resolved, setResolved] = useState(false);
  const frames = ["⠋","⠙","⠹","⠸","⠼","⠴","⠦","⠧","⠇","⠏"];
  const [f, setF] = useState(0);

  useEffect(() => {
    if (line.t !== "out") return;
    const spin = setInterval(() => setF(x => (x + 1) % frames.length), 70);
    const done = setTimeout(() => { setResolved(true); clearInterval(spin); }, 320 + Math.random() * 300);
    return () => { clearInterval(spin); clearTimeout(done); };
  }, []);

  if (line.t === "cmd") {
    const [pre, ...rest] = line.text.split(" ");
    return <span><span className="prompt">{pre}</span> <span className="cmd">{rest.join(" ")}</span></span>;
  }
  if (line.t === "done") {
    return <span className="muted">✓ {line.text}</span>;
  }

  // dotted leader between label and status
  return (
    <span>
      <span className="key">{line.label}</span>
      <span className="dotfill">{"  " + "·".repeat(Math.max(3, 30 - line.label.length)) + "  "}</span>
      {resolved
        ? <span className="badge-ok">{line.status}</span>
        : <span className="spin">{frames[f]} checking</span>}
    </span>
  );
}

function Terminal() {
  const [count, setCount] = useState(0);
  const total = LINES.length;

  useEffect(() => {
    if (count >= total) return;
    const cur = LINES[count];
    const delay = count === 0 ? 380 : (cur && cur.t === "section" ? 200 : 250);
    const id = setTimeout(() => setCount(c => c + 1), delay);
    return () => clearTimeout(id);
  }, [count]);

  return (
    <div className="term">
      <div className="term-bar">
        <div className="traffic"><i></i><i></i><i></i></div>
        <div className="term-title"><b>lab-status</b></div>
      </div>
      <div className="term-body">
        {LINES.slice(0, count).map((line, i) => (
          line.t === "section"
            ? (
              <div key={i} className="sec ln show">
                <span className="sec-name">{line.name}/</span>
                <span className="sec-rule"></span>
                <span className="sec-count">{line.count}</span>
              </div>
            )
            : (
              <span key={i} className="ln show">
                <StatusLine line={line} />
              </span>
            )
        ))}
        {count >= total && (
          <span className="ln show"><span className="prompt">$</span><span className="cursor"></span></span>
        )}
      </div>
    </div>
  );
}

function Topbar() {
  return (
    <header className="topbar">
      <div className="brand">
        <div className="brand-mark"><img src="assets/logo-iw.png" alt="IW" style={{width:"22px",height:"22px",objectFit:"contain"}} /></div>
      </div>
      <nav className="topnav">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
        <a className="lab-link" href="Lab.html">Lab <span className="arw">↗</span></a>
      </nav>
    </header>
  );
}

function Hero() {
  return (
    <section className="hero">
      <main className="stage">
        <section className="identity">
          <div className="kicker rise" style={{ animationDelay: ".05s" }}>
            <span className="bar"></span>IT Infrastructure
          </div>

          <h1 className="name rise" style={{ animationDelay: ".12s" }}>
            Ilham<br /><span className="accent">Wijaya</span>
          </h1>

          <div className="meta rise" style={{ animationDelay: ".2s" }}>
            <span><b>IT Infrastructure</b></span>
          </div>

          <p className="tagline rise" style={{ animationDelay: ".28s" }}>
            <span className="q">“</span>Some list their skills.<br />
            I <span className="hl">run mine.</span><span className="q">”</span>
          </p>

          <div className="ctas rise" style={{ animationDelay: ".36s" }}>
            <a className="btn btn-primary" href="Lab.html">
              Explore My Lab <span className="arw">→</span>
            </a>
            <a className="btn btn-ghost" href="#contact">
              Contact Me
            </a>
          </div>

          <div className="stats rise" style={{ animationDelay: ".44s" }}>
            <div className="stat">
              <div className="num"><em>5+</em></div>
              <div className="lbl">Years<br />Experience</div>
            </div>
            <div className="stat">
              <div className="num"><em>6</em></div>
              <div className="lbl">Industry<br />Certifications</div>
            </div>
            <div className="stat span">
              <div className="num">
                <span className="scope">
                  <span className="chip">HQ</span><span className="plus">+</span>
                  <span className="chip">Branch</span><span className="plus">+</span>
                  <span className="chip">Azure</span>
                </span>
              </div>
              <div className="lbl">Dual-site hybrid<br />cloud topology</div>
            </div>
          </div>
        </section>

        <section className="term-wrap rise" style={{ animationDelay: ".3s" }}>
          <Terminal />
        </section>
      </main>
    </section>
  );
}

function About() {
  return (
    <section id="about" className="section">
      <div className="section-inner">
        <div className="shead">
          <span className="shead-no">01</span>
          <span className="shead-tag">About</span>
          <span className="shead-rule"></span>
        </div>
        <div className="about-grid">
          <div className="about-aside">
            <div className="about-photo">
              <img src="assets/ilham-bw.png" alt="Ilham Wijaya" />
            </div>
            <h2 className="about-title">
              I sit at the intersection of <span className="c">technical depth</span> and <span className="g">business awareness</span>.
            </h2>
            <div className="about-tags">
              <span>Network Engineering</span>
              <span>Security</span>
              <span>Server Virtualization</span>
              <span>Solution Design</span>
              <span>Project Delivery</span>
            </div>
          </div>
          <div className="about-body">
            <p className="about-lead">
              I'm an IT Infrastructure professional with <b>over 5 years of experience</b> spanning
              network engineering, security, server virtualization, and end-to-end project delivery.
              I started my career getting hands-on with network and server deployments, and over time
              grew into roles that involved solution design, presales, and managing projects from the
              first client conversation all the way through to handover.
            </p>
            <p>
              What sets me apart is that I sit at the intersection of technical depth and business
              awareness. I'm comfortable going deep into <b>firewall policies and routing protocols</b>,
              and equally comfortable presenting a solution to a client or putting together a pricing
              proposal. That combination is something I've built gradually — and it's something I
              genuinely enjoy.
            </p>
            <p>
              Outside of work, I'm currently building a full enterprise lab environment from scratch —
              a dual-site network with <span className="tech">Palo Alto</span> and{" "}
              <span className="tech">Fortinet</span> firewalls, a{" "}
              <span className="tech">Kubernetes</span> cluster, hybrid cloud connectivity to{" "}
              <span className="tech">Azure</span>, and a full monitoring stack. Not because I have to,
              but because I want to keep pushing what I know and prove it beyond just a list of bullet
              points on a CV.
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

function Page() {
  const SkillsView = window.SkillsSection;
  const ExperienceView = window.ExperienceSection;
  const ContactView = window.ContactSection;
  return (
    <React.Fragment>
      <Topbar />
      <Hero />
      <About />
      {SkillsView ? <SkillsView /> : null}
      {ExperienceView ? <ExperienceView /> : null}
      {ContactView ? <ContactView /> : null}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
